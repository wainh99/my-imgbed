# 项目名称（自定义）
name = "my-img-bed"
# Pages 输出目录（固定为 public）
pages_build_output_dir = "public"

# 生产环境配置
[env.production]
# R2 存储桶绑定（关键：替换为你的 R2 桶名）
[[env.production.r2_buckets]]
binding = "MY_IMG_BED"
bucket_name = "tuchuang"  # ← 替换成你创建的 R2 桶名

# 环境变量（关键：替换为你的 R2 公开访问地址）
[vars]
PUBLIC_R2_URL = "https://pub-d23656a6c6664c368d3cd88f905499dc.r2.dev"  # ← 替换成你的 R2 公开前缀